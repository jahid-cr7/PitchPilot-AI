name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Safe test values — no real secrets or API keys
  PITCHPILOT_ENV: testing
  PITCHPILOT_JWT_SECRET: test-secret-for-ci-only
  PITCHPILOT_CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
  PITCHPILOT_AI_API_KEY: test
  PITCHPILOT_AI_BASE_URL: https://example.com
  PITCHPILOT_AI_MODEL: test-model

jobs:
  # ---------------------------------------------------------------------------
  # Backend — compile check + pytest
  # ---------------------------------------------------------------------------
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall app.py core pages reports api

      - name: Run pytest
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript compile + Vite production build
  # ---------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Mobile — TypeScript type check (noEmit)
  # ---------------------------------------------------------------------------
  mobile-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: TypeScript check
        working-directory: mobile
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Docker — validate compose configurations (no image build)
  # ---------------------------------------------------------------------------
  docker-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config

      - name: Validate docker-compose.vps.yml
        run: docker compose -f docker-compose.vps.yml config

  # ---------------------------------------------------------------------------
  # E2E — Playwright browser tests against backend + frontend
  # ---------------------------------------------------------------------------
  e2e-tests:
    runs-on: ubuntu-latest
    # Run on PRs and pushes, but allow manual dispatch for heavier debugging
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium

      - name: Start backend
        run: |
          python -m uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          curl -sf http://127.0.0.1:8000/health || (echo "Backend failed to start"; exit 1)

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          SKIP_WEBSERVER: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
